name: probe-mkapi2-latency

# 用途：在 GitHub 海外 runner(ubuntu-latest, Azure 美/欧) 上实测访问国内东财 mkapi2 API 的
# 延迟与超时率，用于核验「海外 GitHub Actions 跨洋访问国内东财 mkapi2 API 是否 ReadTimeout」这一架构论断。
# 与交易业务仓库(moni-trade)完全隔离：本 workflow 仅存在于看板仓库，只写 latency.json / latency-history.jsonl 到本仓库。

"on":
  # 由外部定时器(cron-job.org)每 30 分钟经 workflow_dispatch API 触发。
  # 不用 GitHub 原生 schedule：本仓库实测原生 schedule 延迟数小时（见 moni-trade trigger/README，实测晚~3.5h）。
  workflow_dispatch:

permissions:
  contents: write   # 用于把 latency.json / latency-history.jsonl 写回本仓库（触发 Pages 重建）

jobs:
  probe:
    runs-on: ubuntu-latest   # GitHub 海外 runner —— 真实复现 GitHub Actions 访问国内 API 的场景
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 非浅克隆，rebase 合并历史文件更稳

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probe 东财 mkapi2 (国内 API) from overseas runner
        run: |
          python3 - <<'PY'
          import time, json, datetime
          from urllib.request import Request, urlopen, build_opener
          from urllib.error import URLError, HTTPError

          # 业务真实端点（复刻 moni-trade 的 mx_data_query / news.py / mx-xuangu）
          ENDS = [
            ("claw/query (行情/基本面)", "https://mkapi2.dfcfs.com/finskillshub/api/claw/query",
             {"Content-Type": "application/json", "apikey": ""},
             json.dumps({"toolQuery": "贵州茅台的60日均线"}).encode("utf-8")),
            ("claw/news-search (资讯)", "https://mkapi2.dfcfs.com/finskillshub/api/claw/news-search",
             {"Content-Type": "application/json", "apikey": ""},
             json.dumps({"query": "今日A股要闻", "topN": 3}).encode("utf-8")),
            ("claw/stock-screen (选股)", "https://mkapi2.dfcfs.com/finskillshub/api/claw/stock-screen",
             {"Content-Type": "application/json", "apikey": ""},
             json.dumps({"query": "低估值高分红"}).encode("utf-8")),
          ]
          N, T = 10, 30  # 与业务 mx_data_query(timeout=30) 对齐；每端点 10 次
          out = {
            "generated_at": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "runner": "ubuntu-latest (GitHub 海外 runner, Azure 美/欧)",
            "sample": False,
            "note": "本结果由 GitHub Actions 海外 runner 实测（连通性探针：不带 apikey、不获取实际行情数据，仅测往返延迟与超时率），用于核验『海外跨洋访问国内东财 mkapi2 是否 ReadTimeout』",
            "endpoints": [],
          }
          for name, url, hdr, data in ENDS:
              lat, ok = [], 0
              for _ in range(N):
                  t0 = time.time()
                  try:
                      r = build_opener().open(Request(url, data=data, headers=hdr, method="POST"), timeout=T)
                      r.read()
                      lat.append(round((time.time() - t0) * 1000)); ok += 1
                  except HTTPError:
                      lat.append(round((time.time() - t0) * 1000)); ok += 1
                  except Exception as e:
                      s = str(e).lower()
                      lat.append(T * 1000 if ("timed out" in s or "timeout" in s) else round((time.time() - t0) * 1000))
              out["endpoints"].append({
                  "name": name, "ok": ok, "n": N,
                  "min_ms": min(lat), "avg_ms": round(sum(lat) / len(lat)), "max_ms": max(lat),
              })
          json.dump(out, open("latency.json", "w"), ensure_ascii=False, indent=2)

          # 历史累积：每行一条 JSON 记录（append-only，便于 git 并发合并，一个月约 1440 行，体量可控）
          rec = {
            "generated_at": out["generated_at"],
            "runner": out["runner"],
            "overall_avg_ms": round(sum(e["avg_ms"] for e in out["endpoints"]) / len(out["endpoints"])),
            "ok_total": sum(e["ok"] for e in out["endpoints"]),
            "n_total": sum(e["n"] for e in out["endpoints"]),
            "endpoints": {e["name"]: {"ok": e["ok"], "n": e["n"], "avg_ms": e["avg_ms"], "min_ms": e["min_ms"], "max_ms": e["max_ms"]} for e in out["endpoints"]},
          }
          with open("latency-history.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(rec, ensure_ascii=False) + "\n")

          print("LATEST:", json.dumps(out, ensure_ascii=False))
          print("HISTORY_APPENDED:", rec["generated_at"], "overall_avg_ms=", rec["overall_avg_ms"])
          PY

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 暂存本轮产物（Python 步骤已写入 latency.json 快照 与 latency-history.jsonl 的本轮 1 行）
          cp latency.json /tmp/our_latency.json
          cp latency-history.jsonl /tmp/our_history.jsonl
          for i in 1 2 3 4 5 6; do
            # 每次都基于远端最新 main 重建，彻底规避 rebase 冲突（注：git checkout --union 在该 git 版本不存在）
            git fetch origin main 2>/dev/null || git fetch origin 2>/dev/null || true
            git reset --hard origin/main 2>/dev/null || git reset --hard HEAD
            # latency.json 用本轮快照覆盖（永远是最新一次实测）
            cp /tmp/our_latency.json latency.json
            # 历史：远端最新 + 本轮行，按 generated_at 去重 —— 既不丢行也不重复
            python3 - <<'PY'
          import json
          def load(p):
              try: return [json.loads(l) for l in open(p, encoding='utf-8') if l.strip()]
              except Exception: return []
          rem = load('latency-history.jsonl')
          ours = load('/tmp/our_history.jsonl')
          seen = {r.get('generated_at') for r in rem if isinstance(r, dict)}
          merged = list(rem)
          for r in ours:
              if isinstance(r, dict) and r.get('generated_at') not in seen:
                  merged.append(r); seen.add(r.get('generated_at'))
          with open('latency-history.jsonl', 'w', encoding='utf-8') as f:
              for r in merged:
                  f.write(json.dumps(r, ensure_ascii=False) + '\n')
          PY
            git add latency.json latency-history.jsonl
            if git diff --cached --quiet; then echo "无变化，跳过提交"; continue; fi
            git commit -m "chore: probe mkapi2 latency + history" 2>/dev/null
            if git push origin main 2>/dev/null; then echo "pushed on attempt $i"; exit 0; fi
            echo "push 失败，下一轮重试 ($i)"
            sleep 4
          done
          echo "push 持续失败（罕见并发），本次历史点可能丢失，下一轮自动补齐"
